<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISINTEGRATION — Final Week</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Courier New',Courier,monospace;background:#0D0D0D;color:#E8E4DC;min-height:100vh;padding:36px 22px;max-width:780px;margin:0 auto;}
  .header{text-align:center;margin-bottom:38px;}
  .header .label{font-size:14px;letter-spacing:7px;color:#8C8C8C;text-transform:uppercase;margin-bottom:12px;}
  .header h1{position:relative;display:inline-block;font-size:68px;font-weight:400;letter-spacing:14px;color:#C0392B;text-transform:uppercase;margin:0 0 8px;animation:flicker 5s infinite steps(1,end);}
  .header h1::before,.header h1::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;letter-spacing:14px;pointer-events:none;}
  .header h1::before{color:#21F0F0;transform:translate(-2px,0);animation:glitchA 4s infinite steps(1,end);}
  .header h1::after{color:#8B6CAE;transform:translate(2px,0);animation:glitchB 4s infinite steps(1,end);}
  @keyframes flicker{
    0%,8%,10%,32%,34%,68%,70%,100%{opacity:1;text-shadow:0 0 10px rgba(192,57,43,.55),0 0 22px rgba(192,57,43,.25);}
    9%,33%,69%{opacity:.35;text-shadow:none;}
    11%,55%{opacity:.85;}
    54%{opacity:.45;}
  }
  @keyframes glitchA{
    0%,86%,100%{transform:translate(-2px,0);clip-path:inset(0 0 0 0);}
    87%{transform:translate(-7px,-2px);clip-path:inset(8% 0 64% 0);}
    90%{transform:translate(5px,1px);clip-path:inset(46% 0 24% 0);}
    93%{transform:translate(-5px,2px);clip-path:inset(78% 0 6% 0);}
    96%{transform:translate(4px,-1px);clip-path:inset(26% 0 42% 0);}
  }
  @keyframes glitchB{
    0%,86%,100%{transform:translate(2px,0);clip-path:inset(0 0 0 0);}
    87%{transform:translate(6px,2px);clip-path:inset(70% 0 8% 0);}
    90%{transform:translate(-4px,-1px);clip-path:inset(20% 0 54% 0);}
    93%{transform:translate(5px,-2px);clip-path:inset(40% 0 30% 0);}
    96%{transform:translate(-3px,1px);clip-path:inset(6% 0 76% 0);}
  }
  .header .sub{font-size:14px;color:#9C9C9C;letter-spacing:2px;}
  .progress{margin-bottom:26px;}
  .progress-info{display:flex;justify-content:space-between;font-size:14px;color:#888;margin-bottom:8px;letter-spacing:1px;}
  .progress-bar{height:7px;background:#1A1A1A;border-radius:4px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,#C9B458,#D4764E,#8B6CAE);transition:width .5s ease;}
  .progress-fill.done{background:#C0392B;}
  .filters{display:flex;gap:10px;margin-bottom:26px;}
  .filters button{background:transparent;border:1px solid #2A2A2A;color:#9A9A9A;padding:10px 22px;font-size:14px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:inherit;}
  .filters button.active{background:#1F1F1F;border-color:#333;color:#E8E4DC;}
  .days{display:flex;flex-direction:column;gap:10px;}
  .day{transition:opacity .3s ease;border-radius:4px;}
  .day.complete{opacity:.45;}
  .day-header{display:flex;align-items:center;gap:16px;padding:20px 22px;cursor:pointer;user-select:none;}
  .day-num{font-size:26px;font-weight:700;min-width:54px;letter-spacing:1px;}
  .day-meta{flex:1;}
  .day-meta-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .day-date{font-size:16px;color:#AAA;}
  .phase-tag{font-size:12px;letter-spacing:2px;padding:3px 9px;text-transform:uppercase;}
  .today-tag{font-size:12px;letter-spacing:2px;color:#C0392B;padding:3px 9px;border:1px solid rgba(192,57,43,.4);background:rgba(192,57,43,.1);}
  .milestone{font-size:12px;letter-spacing:1px;color:#C0392B;font-weight:700;}
  .day-count{font-size:13px;color:#8C8C8C;letter-spacing:1px;margin-top:5px;}
  .arrow{font-size:18px;color:#555;transition:transform .2s ease;}
  .arrow.open{transform:rotate(90deg);}
  .day-tasks{padding:0 22px 22px;display:none;flex-direction:column;gap:22px;}
  .day-tasks.open{display:flex;}
  .owner-head{font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;}
  .task{display:flex;gap:13px;cursor:pointer;align-items:flex-start;user-select:none;padding:7px 0;}
  .cb{width:24px;height:24px;min-width:24px;display:flex;align-items:center;justify-content:center;font-size:14px;margin-top:1px;border:1px solid;}
  .cb.checked{border-color:#555!important;background:rgba(255,255,255,.05);color:#666!important;}
  .tx{font-size:17px;line-height:1.55;color:#D2D2D2;}
  .tx.done{color:#555;text-decoration:line-through;}
  .complete-banner{text-align:center;margin-top:44px;padding:32px;border:1px solid rgba(192,57,43,.3);background:rgba(192,57,43,.05);display:none;}
  .complete-banner .top{font-size:17px;letter-spacing:4px;color:#C0392B;}
  .complete-banner .bottom{font-size:14px;color:#777;margin-top:10px;letter-spacing:2px;}
  @media(max-width:520px){
    .header h1,.header h1::before,.header h1::after{font-size:34px;letter-spacing:7px;}
    .tx{font-size:16px;}
  }
  @media(max-width:360px){
    .header h1,.header h1::before,.header h1::after{font-size:27px;letter-spacing:4px;}
  }
</style>
</head>
<body>
<div class="header">
  <div class="label">Final Week</div>
  <h1 data-text="DISINTEGRATION">DISINTEGRATION</h1>
  <div class="sub">Saturday June 20, 2026 — One Night Only</div>
</div>
<div class="progress">
  <div class="progress-info"><span id="tc">0 tasks</span><span id="tp">0%</span></div>
  <div class="progress-bar"><div class="progress-fill" id="pf" style="width:0%"></div></div>
</div>
<div class="filters">
  <button class="active" data-view="all" onclick="setView('all')">All</button>
  <button data-view="remaining" onclick="setView('remaining')">Remaining</button>
</div>
<div class="days" id="list"></div>
<div class="complete-banner" id="complete"><div class="top">ALL TASKS COMPLETE</div><div class="bottom">SHOW NIGHT AWAITS</div></div>
<script>
const PHASES={
 REHEARSE:{c:"#8B6CAE",bg:"rgba(139,108,174,.07)",bd:"rgba(139,108,174,.25)"},
 TECH:{c:"#D4764E",bg:"rgba(212,118,78,.07)",bd:"rgba(212,118,78,.25)"},
 DRESS:{c:"#C9B458",bg:"rgba(201,180,88,.07)",bd:"rgba(201,180,88,.25)"},
 SHOW:{c:"#C0392B",bg:"rgba(192,57,43,.10)",bd:"rgba(192,57,43,.35)"},
};
const OWNERS={t:{label:"Tyler",color:"#D4764E"},c:{label:"Cansu",color:"#8B6CAE"}};
const DAYS=[
 {d:"MON",dt:"Jun 15",iso:"2026-06-15",phase:"REHEARSE",tag:"DRY RUN",
  tyler:["Dry run with props today — walk the full 8-min sequence, time every beat","Buy 2 button-down shirts (1950s style): one clean, one to splatter"],
  cansu:["Finish all 3 creature plates (70% → 100%)","Push projection mapping (65% → 85%)"]},
 {d:"TUE",dt:"Jun 16",iso:"2026-06-16",phase:"REHEARSE",tag:"",
  tyler:["Splatter shirt #2 with black/grey paint, let dry","Practice the shirt swap in the dark","Finalize the envelope line and handwrite it"],
  cansu:["Finish the bowl (last 20%)","Lock the blackout-one mask projection sequence"]},
 {d:"WED",dt:"Jun 17",iso:"2026-06-17",phase:"REHEARSE",tag:"INVITE GUESTS",
  tyler:["Invite all 8 guests, staggered arrivals every 15 min","Finish music (last 20%), export one continuous 8-min file"],
  cansu:["Lock blackout-two creature texture + breathing effect","Set up surround system (atmosphere) + Bose (monster), test both"]},
 {d:"THU",dt:"Jun 18",iso:"2026-06-18",phase:"TECH",tag:"FULL TECH RUN",
  tyler:["Full tech run start to finish: costume swap, fragments, all cues in sequence","Rehearse both blackouts in the dark with Cansu until automatic"],
  cansu:["Run all tech live: lights, projection, sound, creature, mask removal"]},
 {d:"FRI",dt:"Jun 19",iso:"2026-06-19",phase:"DRESS",tag:"DRESS REHEARSAL",
  tyler:["Dress rehearsal for 1 trusted friend, get their reaction","Debrief, final timing tweaks, print the run sheet","Confirm guest times, send reminders"],
  cansu:["Final tech adjustments","Charge all devices, put backup music file on a 2nd device"]},
 {d:"SAT",dt:"Jun 20",iso:"2026-06-20",phase:"SHOW",tag:"SHOW NIGHT",show:true,
  tyler:["Set the room: tunnel up, masks on wall, desk staged, clean shirt on","Lock final number of showings (4-8) + arrival schedule","Brief Cansu on full run-of-show, sync both blackouts","Perform all showings, then CELEBRATE"],
  cansu:["Final tech check 1 hr before — test every cue once","Run all tech during every showing","Film guest reactions at exit, document the night"]}
];
let checked={};
try{const s=localStorage.getItem("disint-v2");if(s)checked=JSON.parse(s);}catch(e){}
let view="all";
const todayISO=new Date().toLocaleDateString("en-CA");
let open=(()=>{const i=DAYS.findIndex(d=>d.iso===todayISO);if(i>=0)return i;const r=DAYS.findIndex((d,di)=>!dayDone(di));return r>=0?r:0;})();
function save(){try{localStorage.setItem("disint-v2",JSON.stringify(checked));}catch(e){}}
function counts(di){let t=0,d=0;DAYS[di].tyler.forEach((x,i)=>{t++;if(checked["t-"+di+"-"+i])d++;});DAYS[di].cansu.forEach((x,i)=>{t++;if(checked["c-"+di+"-"+i])d++;});return{t,d};}
function dayDone(di){const c=counts(di);return c.t>0&&c.d===c.t;}
function toggle(k){if(checked[k])delete checked[k];else checked[k]=1;save();render();}
function toggleDay(di){open=open===di?null:di;render();}
function setView(v){view=v;document.querySelectorAll(".filters button").forEach(b=>b.classList.toggle("active",b.dataset.view===v));render();}
function ownerBlock(day,di,who){
 const o=OWNERS[who];const arr=who==="t"?day.tyler:day.cansu;
 const rows=arr.map((tx,i)=>{const k=who+"-"+di+"-"+i;const c=checked[k];
  return `<div class="task" onclick="toggle('${k}')"><div class="cb${c?" checked":""}" style="border-color:${c?"#555":o.color};color:${c?"#666":o.color}">${c?"✓":""}</div><div class="tx${c?" done":""}">${tx}</div></div>`;}).join("");
 return `<div><div class="owner-head" style="color:${o.color}">${o.label}</div>${rows}</div>`;
}
function render(){
 let total=0,done=0;
 DAYS.forEach((day,di)=>{const c=counts(di);total+=c.t;done+=c.d;});
 const pct=Math.round(done/total*100);
 document.getElementById("tc").textContent=done+"/"+total+" tasks";
 document.getElementById("tp").textContent=pct+"%";
 const pf=document.getElementById("pf");pf.style.width=pct+"%";pf.className=pct===100?"progress-fill done":"progress-fill";
 document.getElementById("complete").style.display=pct===100?"block":"none";
 const list=document.getElementById("list");list.innerHTML="";
 DAYS.forEach((day,di)=>{
  const done2=dayDone(di);
  if(view==="remaining"&&done2)return;
  const ph=PHASES[day.phase];const c=counts(di);const isOpen=open===di;const isToday=day.iso===todayISO;
  const el=document.createElement("div");el.className="day"+(done2?" complete":"");
  el.style.background=isToday?"rgba(192,57,43,.06)":done2?"rgba(255,255,255,.02)":ph.bg;
  el.style.border="1px solid "+(isToday?"rgba(192,57,43,.3)":done2?"#1A1A1A":ph.bd);
  el.innerHTML=`
   <div class="day-header" onclick="toggleDay(${di})">
    <div class="day-num" style="color:${ph.c};opacity:${done2?.5:1}">${done2?"✓ "+day.d:day.d}</div>
    <div class="day-meta">
     <div class="day-meta-row">
      <span class="day-date">${day.dt}</span>
      <span class="phase-tag" style="color:${ph.c};border:1px solid ${ph.bd}">${day.phase}</span>
      ${isToday?'<span class="today-tag">TODAY</span>':""}
      ${day.tag?`<span class="milestone">★ ${day.tag}</span>`:""}
     </div>
     <div class="day-count">${c.d}/${c.t} done</div>
    </div>
    <div class="arrow${isOpen?" open":""}">▶</div>
   </div>
   <div class="day-tasks${isOpen?" open":""}">${ownerBlock(day,di,"t")}${ownerBlock(day,di,"c")}</div>`;
  list.appendChild(el);
 });
}
render();
</script>
</body>
</html>
